<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="fv-sphere" cx="42%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="40%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="fv-ring1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1E3A80" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="fv-ring2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="fv-ring3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1E3A80" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="fv-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <ellipse cx="32" cy="32" rx="27" ry="10" stroke="url(#fv-ring1)" stroke-width="1.5" fill="none"
    transform="rotate(-20 32 32)" filter="url(#fv-glow)"/>

  <!-- Middle ring -->
  <ellipse cx="32" cy="32" rx="21" ry="7.5" stroke="url(#fv-ring2)" stroke-width="1.2" fill="none"
    transform="rotate(-20 32 32)"/>

  <!-- Inner ring -->
  <ellipse cx="32" cy="32" rx="15" ry="5.5" stroke="url(#fv-ring3)" stroke-width="1" fill="none"
    transform="rotate(-20 32 32)"/>

  <!-- Sphere -->
  <circle cx="32" cy="32" r="10" fill="url(#fv-sphere)"/>

  <!-- Specular highlight -->
  <ellipse cx="29" cy="28.5" rx="3.5" ry="2" fill="white" opacity="0.35" transform="rotate(-15 29 28.5)"/>
</svg>
